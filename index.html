<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Boolean Function Minimizer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- error Pop up -->
<div id="error-popup" class="popup hidden">
  <div class="popup-box">
    <p id="popup-msg"></p>
    <button id="errorBtn">OK</button>
  </div>
</div>

<!-- input view-->
<div id="input-view">
  <h1>Boolean Function Minimizer</h1>
  <section>
    <h2>Input</h2>
    <form id="input-form">
      <div class="grid">
        <div>
          <h3>Variables</h3>
          <input id="var" type="number" min="1" placeholder="e.g. 4" class="mono">
          <div id="err-var" class="err"></div>
        </div>
        <div>
          <h3>Minterms</h3>
          <input id="minterms" type="text" placeholder="e.g. 1,2,3" class="mono">
          <div id="err-minterms" class="err"></div>
        </div>
        <div>
          <h3>Don’t Cares</h3>
          <input id="dontcares" type="text" placeholder="e.g. 5,7" class="mono">
          <div id="err-dc" class="err"></div>
        </div>
      </div>
      <button id="run" type="submit" disabled style="margin-top:12px">Loading WASM…</button>
    </form>
  </section>
</div>

<!-- OUTPUT VIEW -->
<div id="output-view" class = "hidden">

  <button id = 'back' style="margin-bottom:14px">← Back</button>

  <div id="input-overview"></div>

  <div id ="result"></div>

  <div id="tabulation"></div>

  <div id = 'prime-implicants'></div>

  <div id = "essential-prime"></div>

  <div id = 'uncovered-minterms'></div>

  <div id ="petrick"></div>

</div>

<!-- WASM -->
<script src="./js/quine.js"></script>
<script type="module" src = "./js/main.js" defer></script>

</body>
</html>
